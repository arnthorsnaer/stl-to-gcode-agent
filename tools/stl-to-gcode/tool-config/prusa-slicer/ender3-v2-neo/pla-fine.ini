# Deterministic PLA fine profile for Creality Ender-3 V2 Neo
# Slower 0.12 mm PLA prints, using the same printer assumptions as pla-normal.

printer_model = ENDER3V2NEO_LOCAL
printer_variant = 0.4
printer_technology = FFF
bed_shape = 0x0,220x0,220x220,0x220
max_print_height = 250
nozzle_diameter = 0.4
gcode_flavor = marlin
use_relative_e_distances = 0
retract_length = 5
retract_speed = 45
deretract_speed = 25
travel_speed = 180
z_offset = 0
start_gcode = G90 ; use absolute coordinates\nM83 ; extruder relative mode\nM140 S[first_layer_bed_temperature] ; set bed temp\nM104 S[first_layer_temperature] ; set extruder temp\nM190 S[first_layer_bed_temperature] ; wait for bed temp\nM109 S[first_layer_temperature] ; wait for extruder temp\nG28 ; home all axes\nG92 E0\nG1 Z2.0 F3000\nG1 X0.1 Y20 Z0.3 F5000.0\nG1 X0.1 Y200.0 Z0.3 F1500.0 E15\nG1 X0.4 Y200.0 Z0.3 F5000.0\nG1 X0.4 Y20 Z0.3 F1500.0 E30\nG92 E0\nG1 Z2.0 F3000
end_gcode = M104 S0 ; turn off extruder\nM140 S0 ; turn off bed\nG91 ; relative positioning\nG1 E-2 F2700\nG1 Z10 F3000\nG90 ; absolute positioning\nG1 X0 Y220 F3000 ; present print\nM84 ; disable motors

layer_height = 0.12
first_layer_height = 0.2
perimeters = 3
top_solid_layers = 7
bottom_solid_layers = 7
fill_density = 15%
fill_pattern = gyroid
solid_infill_speed = 45
top_solid_infill_speed = 30
perimeter_speed = 35
external_perimeter_speed = 25
infill_speed = 50
first_layer_speed = 20
support_material = 0
skirts = 1
skirt_distance = 6
brim_width = 0
ensure_vertical_shell_thickness = 1
seam_position = aligned
avoid_crossing_perimeters = 0
complete_objects = 0

filament_type = PLA
filament_diameter = 1.75
first_layer_temperature = 205
temperature = 200
first_layer_bed_temperature = 60
bed_temperature = 60
fan_always_on = 1
cooling = 1
min_fan_speed = 35
max_fan_speed = 100
bridge_fan_speed = 100
filament_retract_length = 5
filament_retract_speed = 45
